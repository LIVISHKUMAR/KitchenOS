name: KitchenOS CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Backend Lint & Type Check
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: cd backend && ruff check . --output-format=github

      - name: Ruff format check
        run: cd backend && ruff format --check .

  # Backend Test
  backend-test:
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short
        env:
          SECRET_KEY: test-secret-key-for-ci-only-min-32-chars

      - name: Verify app imports
        run: |
          cd backend
          python -c "from app.main import app; print('App loaded OK')"

  # Frontend Lint & Type Check
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: cd frontend && pnpm install

      - name: TypeScript check (POS)
        run: cd frontend/apps/pos && npx tsc --noEmit

      - name: TypeScript check (Admin)
        run: cd frontend/apps/admin && npx tsc --noEmit

      - name: TypeScript check (KDS)
        run: cd frontend/apps/kds && npx tsc --noEmit

  # Frontend Build
  frontend-build:
    runs-on: ubuntu-latest
    needs: frontend-lint
    strategy:
      matrix:
        app: [pos, admin, kds, online-ordering]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: cd frontend && pnpm install

      - name: Build ${{ matrix.app }}
        run: cd frontend/apps/${{ matrix.app }} && npx vite build

  # Security Scan
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  # Docker Build
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, security-scan]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: kitchenos-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build POS frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          build-args: APP_NAME=pos
          tags: kitchenos-pos:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Admin frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          build-args: APP_NAME=admin
          tags: kitchenos-admin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy (staging)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/master'
    environment: staging
    steps:
      - name: Deploy to staging
        run: echo "Deploying to staging environment..."

  # Deploy (production)
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Deploy to production
        run: echo "Deploying to production environment..."
