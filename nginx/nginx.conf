upstream backend {
    least_conn;
    server backend:8000 max_fails=3 fail_timeout=30s;
    # server backend-2:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream frontend-pos {
    server frontend-pos:80;
}

upstream frontend-admin {
    server frontend-admin:80;
}

upstream frontend-kds {
    server frontend-kds:80;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

server {
    listen 80;
    server_name api.kitchenos.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # API backend
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Auth endpoints - stricter rate limiting
    location /api/v1/auth/ {
        limit_req zone=auth burst=3 nodelay;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check
    location /health {
        proxy_pass http://backend;
        access_log off;
    }

    # Static files caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# POS Frontend
server {
    listen 80;
    server_name pos.kitchenos.com;

    location / {
        proxy_pass http://frontend-pos;
        proxy_set_header Host $host;
    }
}

# Admin Frontend
server {
    listen 80;
    server_name admin.kitchenos.com;

    location / {
        proxy_pass http://frontend-admin;
        proxy_set_header Host $host;
    }
}

# KDS Frontend
server {
    listen 80;
    server_name kds.kitchenos.com;

    location / {
        proxy_pass http://frontend-kds;
        proxy_set_header Host $host;
    }
}
