<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KitchenOS Customer Display</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
    .animate-slide-up { animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  </style>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col">
  <div id="app" class="flex-1 flex flex-col"></div>
  <script>
    const WEBSOCKET_URL = `ws://${window.location.host}/ws`;
    const API_URL = '/api/v1';

    let state = {
      connected: false,
      mode: 'idle', // idle, ordering, paying, complete
      orderItems: [],
      subtotal: 0,
      tax: 0,
      total: 0,
      orderNumber: null,
      paymentMethod: null,
      loyaltyPoints: 0,
      customerName: null,
      upiQR: null,
    };

    function render() {
      const app = document.getElementById('app');
      if (state.mode === 'idle') {
        app.innerHTML = renderIdle();
      } else if (state.mode === 'ordering') {
        app.innerHTML = renderOrder();
      } else if (state.mode === 'paying') {
        app.innerHTML = renderPaying();
      } else if (state.mode === 'complete') {
        app.innerHTML = renderComplete();
      }
    }

    function renderIdle() {
      return `
        <div class="flex-1 flex flex-col items-center justify-center">
          <div class="text-6xl mb-6">🍽️</div>
          <h1 class="text-4xl font-bold mb-2">KitchenOS</h1>
          <p class="text-xl text-gray-400">Welcome!</p>
          ${state.loyaltyPoints > 0 ? `<p class="text-lg text-yellow-400 mt-4">⭐ ${state.loyaltyPoints} Loyalty Points</p>` : ''}
          ${state.customerName ? `<p class="text-lg text-gray-300 mt-2">Hello, ${state.customerName}!</p>` : ''}
          <div class="mt-8 text-gray-500 text-sm pulse">
            ${state.connected ? '🟢 Ready' : '🔴 Connecting...'}
          </div>
        </div>
      `;
    }

    function renderOrder() {
      return `
        <div class="flex-1 flex flex-col p-8">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Your Order</h2>
            ${state.orderNumber ? `<span class="text-xl text-blue-400">#${state.orderNumber}</span>` : ''}
          </div>
          <div class="flex-1 overflow-auto mb-6">
            ${state.orderItems.map(item => `
              <div class="flex justify-between items-center py-3 border-b border-gray-700 animate-slide-up">
                <div class="flex items-center gap-3">
                  <span class="text-lg font-bold text-blue-400">${item.quantity}x</span>
                  <span class="text-lg">${item.name}</span>
                </div>
                <span class="text-lg font-medium">₹${(item.unitPrice * item.quantity).toFixed(2)}</span>
              </div>
            `).join('')}
          </div>
          <div class="border-t-2 border-gray-600 pt-4 space-y-2">
            <div class="flex justify-between text-gray-400">
              <span>Subtotal</span>
              <span>₹${state.subtotal.toFixed(2)}</span>
            </div>
            <div class="flex justify-between text-gray-400">
              <span>Tax (GST)</span>
              <span>₹${state.tax.toFixed(2)}</span>
            </div>
            <div class="flex justify-between text-3xl font-bold pt-2 border-t border-gray-600">
              <span>Total</span>
              <span class="text-green-400">₹${state.total.toFixed(2)}</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderPaying() {
      return `
        <div class="flex-1 flex flex-col items-center justify-center p-8">
          <h2 class="text-3xl font-bold mb-2">Payment</h2>
          <p class="text-5xl font-bold text-green-400 mb-8">₹${state.total.toFixed(2)}</p>
          ${state.paymentMethod === 'upi' && state.upiQR ? `
            <div class="bg-white p-6 rounded-2xl mb-6">
              <div class="w-64 h-64 flex items-center justify-center">
                <div class="text-center">
                  <div class="text-6xl mb-2">📱</div>
                  <p class="text-gray-800 font-bold text-lg">Scan to Pay</p>
                  <p class="text-gray-500 text-sm mt-1">UPI Payment</p>
                </div>
              </div>
            </div>
            <p class="text-gray-400 text-lg pulse">Waiting for payment...</p>
          ` : `
            <div class="text-center">
              <p class="text-2xl mb-4">${state.paymentMethod === 'cash' ? '💵' : state.paymentMethod === 'card' ? '💳' : '👛'}</p>
              <p class="text-xl text-gray-300 capitalize">${state.paymentMethod} Payment</p>
              <p class="text-gray-400 mt-2 pulse">Processing...</p>
            </div>
          `}
        </div>
      `;
    }

    function renderComplete() {
      return `
        <div class="flex-1 flex flex-col items-center justify-center">
          <div class="text-8xl mb-6">✅</div>
          <h2 class="text-4xl font-bold mb-2 text-green-400">Payment Successful!</h2>
          ${state.orderNumber ? `<p class="text-2xl text-gray-300 mb-2">Order #${state.orderNumber}</p>` : ''}
          <p class="text-3xl font-bold text-white mb-6">₹${state.total.toFixed(2)}</p>
          ${state.loyaltyPoints > 0 ? `
            <div class="bg-yellow-900/30 px-6 py-3 rounded-xl mb-4">
              <p class="text-yellow-400 text-lg">⭐ You earned loyalty points!</p>
            </div>
          ` : ''}
          <p class="text-xl text-gray-400 mt-4">Thank you for your order!</p>
          <p class="text-gray-500 mt-2">Please collect your receipt</p>
        </div>
      `;
    }

    // WebSocket connection
    let ws = null;
    let reconnectTimeout = null;

    function connect() {
      const token = localStorage.getItem('display_token') || '';
      ws = new WebSocket(`${WEBSOCKET_URL}?token=${token}&client_type=display`);

      ws.onopen = () => {
        state.connected = true;
        render();
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          switch (data.type) {
            case 'order.created':
            case 'order.updated':
              if (data.data) {
                state.mode = 'ordering';
                state.orderItems = data.data.items || [];
                state.subtotal = data.data.subtotal || 0;
                state.tax = data.data.tax || 0;
                state.total = data.data.total || 0;
                state.orderNumber = data.data.order_number;
              }
              break;
            case 'payment.initiated':
              state.mode = 'paying';
              state.paymentMethod = data.data?.payment_method;
              state.upiQR = data.data?.upi_qr;
              break;
            case 'payment.completed':
              state.mode = 'complete';
              setTimeout(() => {
                state.mode = 'idle';
                state.orderItems = [];
                state.total = 0;
                render();
              }, 8000);
              break;
            case 'display.idle':
              state.mode = 'idle';
              state.orderItems = [];
              state.total = 0;
              break;
          }
          render();
        } catch { /* ignore */ }
      };

      ws.onclose = () => {
        state.connected = false;
        render();
        reconnectTimeout = setTimeout(connect, 3000);
      };
    }

    // Initial render
    render();
    connect();
  </script>
</body>
</html>
