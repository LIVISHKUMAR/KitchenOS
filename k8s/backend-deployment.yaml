apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchenos-backend
  labels:
    app: kitchenos-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kitchenos-backend
  template:
    metadata:
      labels:
        app: kitchenos-backend
    spec:
      containers:
        - name: backend
          image: kitchenos-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kitchenos-secrets
                  key: database-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: kitchenos-secrets
                  key: secret-key
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: kitchenos-config
                  key: redis-url
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: kitchenos-backend-service
spec:
  selector:
    app: kitchenos-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kitchenos-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kitchenos-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
